<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Scheduler</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  background: #f4f6f8;
  color: #1f2933;
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  font-size: 13px;
}
button, input, textarea { font: inherit; }
.titlebar {
  height: 42px;
  background: #ffffff;
  border-bottom: 1px solid #dde3ea;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 18px;
  box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
}
.dot { width: 11px; height: 11px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }
.title { color: #1f2933; font-size: 14px; font-weight: 650; }
.port { margin-left: auto; color: #6b7280; font-size: 12px; }
.app {
  height: calc(100vh - 42px);
  display: grid;
  grid-template-columns: minmax(460px, 1fr) minmax(390px, 460px);
  min-height: 0;
}
.left, .right { min-height: 0; overflow: auto; }
.left {
  border-right: 1px solid #dde3ea;
  padding: 22px 26px;
}
.right {
  background: #eef2f6;
  padding: 18px 18px 20px;
}
.section-hd {
  color: #4b5563;
  font-size: 12px;
  font-weight: 650;
  border-bottom: 1px solid #dde3ea;
  padding-bottom: 8px;
  margin-bottom: 18px;
}
.field { margin-bottom: 16px; }
.lbl {
  display: block;
  color: #374151;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 6px;
}
.row { display: flex; gap: 8px; align-items: center; }
.inp, .ta {
  width: 100%;
  background: #ffffff;
  color: #111827;
  border: 1px solid #cfd8e3;
  border-radius: 6px;
  outline: none;
}
.inp { height: 34px; padding: 7px 10px; }
.inp-time { max-width: 124px; }
.ta {
  min-height: 154px;
  max-height: 260px;
  resize: vertical;
  padding: 9px 10px;
  line-height: 1.55;
}
.inp:focus, .ta:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
}
.btn {
  height: 34px;
  background: #ffffff;
  border: 1px solid #cfd8e3;
  border-radius: 6px;
  color: #374151;
  padding: 0 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.btn:hover { background: #f8fafc; border-color: #94a3b8; color: #111827; }
.btn:disabled { opacity: .45; cursor: default; }
.btn-primary { background: #2563eb; border-color: #2563eb; color: #ffffff; font-weight: 700; }
.btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; color: #ffffff; }
.btn-danger:hover { border-color: #ef4444; color: #b91c1c; background: #fef2f2; }
.btn-mini { height: 26px; padding: 0 8px; font-size: 11px; }
.daybar { display: flex; flex-wrap: wrap; gap: 7px; }
.daybtn.active, .tab.active { background: #dbeafe; border-color: #2563eb; color: #1d4ed8; }
.actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.console-wrap {
  margin-top: 16px;
  border: 1px solid #dde3ea;
  border-radius: 8px;
  background: #ffffff;
  overflow: hidden;
}
.console-hd {
  height: 28px;
  padding: 7px 10px;
  border-bottom: 1px solid #e5eaf0;
  color: #6b7280;
  font-size: 12px;
  font-weight: 650;
}
.console {
  max-height: 170px;
  overflow-y: auto;
  padding: 9px 10px;
  line-height: 1.6;
}
.log { display: flex; gap: 8px; }
.log-t { color: #94a3b8; white-space: nowrap; }
.log-m { color: #475569; }
.log-m.ok { color: #15803d; }
.log-m.err { color: #dc2626; }
.task-list { display: grid; gap: 8px; margin-bottom: 18px; }
.task-row {
  border: 1px solid #dde3ea;
  background: #ffffff;
  border-radius: 8px;
  padding: 9px;
  display: grid;
  grid-template-columns: 10px 1fr auto;
  gap: 9px;
  align-items: center;
}
.task-row.disabled { opacity: .55; }
.color-dot { width: 10px; height: 10px; border-radius: 50%; }
.task-name { color: #111827; font-size: 12px; font-weight: 650; overflow-wrap: anywhere; }
.task-meta { color: #6b7280; font-size: 11px; margin-top: 3px; overflow-wrap: anywhere; }
.task-controls { display: flex; gap: 5px; align-items: center; }
.switch {
  width: 34px;
  height: 18px;
  border: 1px solid #cbd5e1;
  background: #e5e7eb;
  border-radius: 999px;
  padding: 2px;
  cursor: pointer;
}
.switch span { display: block; width: 12px; height: 12px; background: #94a3b8; border-radius: 50%; transition: transform .12s; }
.switch.on { border-color: #2563eb; background: #dbeafe; }
.switch.on span { background: #2563eb; transform: translateX(14px); }
.tabs { display: flex; gap: 7px; margin-bottom: 14px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.agenda { display: grid; gap: 7px; }
.agenda-item {
  width: 100%;
  border: 1px solid #dde3ea;
  background: #ffffff;
  color: #1f2933;
  border-radius: 8px;
  text-align: left;
  padding: 9px;
  cursor: pointer;
}
.agenda-item:hover { border-color: #94a3b8; background: #f8fafc; }
.agenda-top { display: flex; justify-content: space-between; gap: 10px; color: #2563eb; font-size: 11px; font-weight: 650; }
.agenda-name { margin-top: 5px; overflow-wrap: anywhere; }
.agenda-path { margin-top: 3px; color: #6b7280; font-size: 11px; overflow-wrap: anywhere; }
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.month-title { color: #1f2933; font-size: 13px; font-weight: 650; }
.calendar {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  border-left: 1px solid #dde3ea;
  border-top: 1px solid #dde3ea;
  background: #ffffff;
  border-radius: 8px;
  overflow: hidden;
}
.cal-label, .cal-day {
  min-width: 0;
  border-right: 1px solid #dde3ea;
  border-bottom: 1px solid #dde3ea;
}
.cal-label {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #6b7280;
  font-size: 10px;
  font-weight: 650;
}
.cal-day {
  min-height: 74px;
  background: #ffffff;
  padding: 6px;
  cursor: pointer;
}
.cal-day.out { background: #f8fafc; color: #cbd5e1; cursor: default; }
.cal-day.selected { outline: 2px solid #2563eb; outline-offset: -2px; background: #eff6ff; }
.day-num { color: #374151; font-size: 11px; }
.dots { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 9px; }
.mini-dot { width: 6px; height: 6px; border-radius: 50%; }
.day-detail { margin-top: 14px; border-top: 1px solid #dde3ea; padding-top: 12px; }
.empty { color: #6b7280; font-size: 11px; font-style: italic; padding: 10px 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; }
@media (max-width: 900px) {
  body { overflow: auto; }
  .app { height: auto; grid-template-columns: 1fr; }
  .left { border-right: 0; border-bottom: 1px solid #dde3ea; }
}
</style>
</head>
<body>
<div class="titlebar">
  <div class="dot dot-r"></div>
  <div class="dot dot-y"></div>
  <div class="dot dot-g"></div>
  <div class="title">Claude Scheduler</div>
  <div class="port">localhost:3000</div>
</div>

<main class="app">
  <section class="left">
    <div class="section-hd">Task Editor</div>

    <div class="field">
      <label class="lbl" for="taskName">Task Name</label>
      <input id="taskName" class="inp" type="text" autocomplete="off" required>
    </div>

    <div class="field">
      <label class="lbl" for="projectDir">Project Path</label>
      <div class="row">
        <input id="projectDir" class="inp" type="text" placeholder="C:\dev\my-project" autocomplete="off" spellcheck="false">
        <button class="btn" id="browseBtn" type="button">Browse</button>
      </div>
    </div>

    <div class="field">
      <label class="lbl" for="triggerTime">Trigger Time</label>
      <input id="triggerTime" class="inp inp-time" type="time" value="05:00">
    </div>

    <div class="field">
      <label class="lbl">Days</label>
      <div class="daybar" id="dayBar"></div>
    </div>

    <div class="field">
      <label class="lbl" for="prompt">Task Prompt</label>
      <textarea id="prompt" class="ta" rows="10" spellcheck="false"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="saveBtn" type="button">Save Task</button>
      <button class="btn" id="testRunBtn" type="button">Test Run</button>
      <button class="btn" id="clearBtn" type="button">Clear</button>
      <button class="btn" id="loadDefaultBtn" type="button">Load Default</button>
      <button class="btn" id="viewLogsBtn" type="button">Logs</button>
      <button class="btn" id="taskSchdBtn" type="button">Task Scheduler</button>
    </div>

    <div class="console-wrap">
      <div class="console-hd">Output</div>
      <div class="console" id="console"></div>
    </div>
  </section>

  <aside class="right">
    <div class="section-hd">Tasks</div>
    <div id="taskList" class="task-list"></div>

    <div class="tabs">
      <button class="btn tab active" data-tab="agenda" type="button">Agenda</button>
      <button class="btn tab" data-tab="calendar" type="button">Calendar</button>
    </div>

    <section id="agendaPanel" class="tab-panel active">
      <div id="agenda" class="agenda"></div>
    </section>

    <section id="calendarPanel" class="tab-panel">
      <div class="cal-head">
        <button class="btn btn-mini" id="prevMonth" type="button">Prev</button>
        <div class="month-title" id="monthTitle"></div>
        <button class="btn btn-mini" id="nextMonth" type="button">Next</button>
      </div>
      <div id="calendar" class="calendar"></div>
      <div id="dayDetail" class="day-detail"></div>
    </section>
  </aside>
</main>

<script>
const DEFAULT_PROMPT = `You are operating in headless, non-interactive mode. There is no human to ask
clarifying questions. You MUST complete the full pipeline below before stopping.
Do not ask questions. Do not stop after planning. If a step is ambiguous, make
a reasonable choice, document it, and continue.

STEP 1 - ANALYSE
Read the repository structure. Identify language, framework, build/test/lint
commands. Pick ONE concrete scoped task: failing tests, TODOs marked URGENT,
or if nothing obvious: "clean up dead code in the most recently modified file".

STEP 2 - PLAN
Write a numbered plan to .automation/PLAN.md with: chosen task, files to touch,
concrete steps, validation command. Then print the plan to stdout.

STEP 3 - EXECUTE
Implement the changes with Edit/Write tools. If codex --version succeeds,
delegate via: codex exec --skip-git-repo-check "<task from plan>"
Otherwise implement directly. Retry once on non-zero exit with clearer description.

STEP 4 - VALIDATE
Run the validation command from STEP 1 (npm test / pytest / cargo test / etc).
If it fails: make ONE targeted fix, re-run. If still failing: document and stop cleanly.

STEP 5 - REPORT
Write .automation/LAST_RUN.md with: timestamp, task chosen, files changed
(git diff --stat), validation result (PASS/FAIL). Print 5-line summary to stdout.`;

const dayDefs = [
  ['mon', 'Mon', 1],
  ['tue', 'Tue', 2],
  ['wed', 'Wed', 3],
  ['thu', 'Thu', 4],
  ['fri', 'Fri', 5],
  ['sat', 'Sat', 6],
  ['sun', 'Sun', 0]
];
const dayToJs = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6 };
const colors = ['#2563eb', '#16a34a', '#f59e0b', '#db2777', '#7c3aed', '#0891b2', '#ea580c', '#64748b'];

let tasks = [];
let selectedTaskId = null;
let selectedDays = new Set(dayDefs.map(([key]) => key));
let calendarDate = new Date();
calendarDate.setDate(1);
let selectedCalendarDay = null;

const $ = id => document.getElementById(id);

function now() {
  return new Date().toTimeString().slice(0, 8);
}

function appendLog(msg, type, time) {
  const line = document.createElement('div');
  line.className = 'log';
  const t = document.createElement('span');
  t.className = 'log-t';
  t.textContent = '[' + (time || now()) + ']';
  const m = document.createElement('span');
  m.className = 'log-m' + (type === 'success' ? ' ok' : type === 'error' ? ' err' : '');
  m.textContent = msg;
  line.append(t, m);
  $('console').appendChild(line);
  $('console').scrollTop = $('console').scrollHeight;
}

function clearConsole() {
  $('console').innerHTML = '';
}

function basename(projectDir) {
  return String(projectDir || '').split(/[\\/]/).filter(Boolean).pop() || projectDir || '';
}

function taskColor(task) {
  const index = Math.max(0, tasks.findIndex(item => item.id === task.id));
  return colors[index % colors.length];
}

function setBusy(busy) {
  $('saveBtn').disabled = busy;
  $('saveBtn').textContent = busy ? 'Saving...' : 'Save Task';
}

function renderDayButtons() {
  const bar = $('dayBar');
  bar.innerHTML = '';
  const every = document.createElement('button');
  every.type = 'button';
  every.className = 'btn daybtn' + (selectedDays.size === 7 ? ' active' : '');
  every.textContent = 'Every Day';
  every.addEventListener('click', () => {
    selectedDays = new Set(dayDefs.map(([key]) => key));
    renderDayButtons();
  });
  bar.appendChild(every);

  for (const [key, label] of dayDefs) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn daybtn' + (selectedDays.has(key) ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => {
      if (selectedDays.has(key)) selectedDays.delete(key);
      else selectedDays.add(key);
      renderDayButtons();
    });
    bar.appendChild(btn);
  }
}

function daysToSelection(days) {
  if (!Array.isArray(days) || days[0] === 'daily') {
    selectedDays = new Set(dayDefs.map(([key]) => key));
  } else {
    selectedDays = new Set(days);
  }
  renderDayButtons();
}

function formDays() {
  const days = dayDefs.map(([key]) => key).filter(key => selectedDays.has(key));
  return days.length === 7 ? ['daily'] : days;
}

function taskFromForm(base) {
  return {
    ...(base || {}),
    name: $('taskName').value.trim(),
    projectDir: $('projectDir').value.trim(),
    triggerTime: $('triggerTime').value,
    days: formDays(),
    prompt: $('prompt').value,
    enabled: base ? base.enabled !== false : true
  };
}

function clearForm() {
  selectedTaskId = null;
  $('taskName').value = '';
  $('projectDir').value = '';
  $('triggerTime').value = '05:00';
  $('prompt').value = DEFAULT_PROMPT;
  daysToSelection(['daily']);
}

function loadTask(task) {
  selectedTaskId = task.id;
  $('taskName').value = task.name || '';
  $('projectDir').value = task.projectDir || '';
  $('triggerTime').value = task.triggerTime || '05:00';
  $('prompt').value = task.prompt || '';
  daysToSelection(task.days || ['daily']);
  renderTasks();
}

function matchesDay(task, date) {
  if (!task.enabled) return false;
  if (task.days && task.days[0] === 'daily') return true;
  const code = Object.keys(dayToJs).find(key => dayToJs[key] === date.getDay());
  return Array.isArray(task.days) && task.days.includes(code);
}

function occurrenceDate(day, triggerTime) {
  const [h, m] = triggerTime.split(':').map(Number);
  const date = new Date(day);
  date.setHours(h, m, 0, 0);
  return date;
}

function nextOccurrences() {
  const out = [];
  const start = new Date();
  const end = new Date(start);
  end.setDate(end.getDate() + 14);
  for (const task of tasks.filter(item => item.enabled)) {
    for (let i = 0; i <= 14; i++) {
      const day = new Date(start);
      day.setHours(0, 0, 0, 0);
      day.setDate(day.getDate() + i);
      if (!matchesDay(task, day)) continue;
      const at = occurrenceDate(day, task.triggerTime || '00:00');
      if (at >= start && at <= end) out.push({ task, at });
    }
  }
  return out.sort((a, b) => a.at - b.at);
}

function renderTasks() {
  const list = $('taskList');
  list.innerHTML = '';
  if (!tasks.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No tasks yet.';
    list.appendChild(empty);
    return;
  }

  for (const task of tasks) {
    const row = document.createElement('div');
    row.className = 'task-row' + (task.enabled ? '' : ' disabled');
    if (task.id === selectedTaskId) row.style.borderColor = '#2563eb';

    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = taskColor(task);

    const info = document.createElement('div');
    const name = document.createElement('div');
    name.className = 'task-name';
    name.textContent = task.name;
    const meta = document.createElement('div');
    meta.className = 'task-meta';
    meta.textContent = `${task.triggerTime} | ${task.days && task.days[0] === 'daily' ? 'daily' : (task.days || []).join(', ')} | ${basename(task.projectDir)}`;
    info.append(name, meta);

    const controls = document.createElement('div');
    controls.className = 'task-controls';
    const toggle = document.createElement('button');
    toggle.className = 'switch' + (task.enabled ? ' on' : '');
    toggle.type = 'button';
    toggle.title = 'Toggle enabled';
    toggle.innerHTML = '<span></span>';
    toggle.addEventListener('click', () => toggleTask(task));

    const edit = document.createElement('button');
    edit.className = 'btn btn-mini';
    edit.type = 'button';
    edit.textContent = 'Edit';
    edit.addEventListener('click', () => loadTask(task));

    const del = document.createElement('button');
    del.className = 'btn btn-mini btn-danger';
    del.type = 'button';
    del.textContent = 'Del';
    del.addEventListener('click', () => deleteTask(task));
    controls.append(toggle, edit, del);
    row.append(dot, info, controls);
    list.appendChild(row);
  }
}

function renderAgenda() {
  const agenda = $('agenda');
  agenda.innerHTML = '';
  const occurrences = nextOccurrences();
  if (!occurrences.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No enabled task runs in the next 14 days.';
    agenda.appendChild(empty);
    return;
  }

  for (const item of occurrences) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'agenda-item';
    btn.addEventListener('click', () => loadTask(item.task));
    const top = document.createElement('div');
    top.className = 'agenda-top';
    const date = document.createElement('span');
    date.textContent = item.at.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: '2-digit' });
    const time = document.createElement('span');
    time.textContent = item.task.triggerTime;
    top.append(date, time);
    const name = document.createElement('div');
    name.className = 'agenda-name';
    name.textContent = item.task.name;
    const project = document.createElement('div');
    project.className = 'agenda-path';
    project.textContent = basename(item.task.projectDir);
    btn.append(top, name, project);
    agenda.appendChild(btn);
  }
}

function tasksForCalendarDay(date) {
  return tasks.filter(task => matchesDay(task, date));
}

function sameDate(a, b) {
  return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function renderCalendar() {
  const grid = $('calendar');
  grid.innerHTML = '';
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  if (!selectedCalendarDay || selectedCalendarDay.getMonth() !== month || selectedCalendarDay.getFullYear() !== year) {
    selectedCalendarDay = new Date(year, month, 1);
  }
  $('monthTitle').textContent = calendarDate.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  for (const label of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']) {
    const cell = document.createElement('div');
    cell.className = 'cal-label';
    cell.textContent = label;
    grid.appendChild(cell);
  }

  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(1 - first.getDay());

  for (let i = 0; i < 42; i++) {
    const day = new Date(start);
    day.setDate(start.getDate() + i);
    const cell = document.createElement('button');
    cell.type = 'button';
    cell.className = 'cal-day' + (day.getMonth() === month ? '' : ' out') + (sameDate(day, selectedCalendarDay) ? ' selected' : '');
    cell.disabled = day.getMonth() !== month;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = day.getDate();
    const dots = document.createElement('div');
    dots.className = 'dots';
    for (const task of tasksForCalendarDay(day)) {
      const dot = document.createElement('span');
      dot.className = 'mini-dot';
      dot.style.background = taskColor(task);
      dots.appendChild(dot);
    }
    cell.append(num, dots);
    cell.addEventListener('click', () => {
      selectedCalendarDay = day;
      renderCalendar();
      renderDayDetail(day);
    });
    grid.appendChild(cell);
  }

  renderDayDetail(selectedCalendarDay);
}

function renderDayDetail(day) {
  const box = $('dayDetail');
  box.innerHTML = '';
  const heading = document.createElement('div');
  heading.className = 'section-hd';
  heading.textContent = day.toLocaleDateString('en-GB', { weekday: 'long', day: '2-digit', month: 'long' });
  box.appendChild(heading);

  const dayTasks = tasksForCalendarDay(day).sort((a, b) => String(a.triggerTime).localeCompare(String(b.triggerTime)));
  if (!dayTasks.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No enabled tasks scheduled.';
    box.appendChild(empty);
    return;
  }

  for (const task of dayTasks) {
    const item = document.createElement('button');
    item.className = 'agenda-item';
    item.type = 'button';
    item.addEventListener('click', () => loadTask(task));
    const top = document.createElement('div');
    top.className = 'agenda-top';
    const name = document.createElement('span');
    name.textContent = task.name;
    const time = document.createElement('span');
    time.textContent = task.triggerTime;
    top.append(name, time);
    const project = document.createElement('div');
    project.className = 'agenda-path';
    project.textContent = basename(task.projectDir);
    item.append(top, project);
    box.appendChild(item);
  }
}

function renderAll() {
  renderTasks();
  renderAgenda();
  renderCalendar();
}

async function loadTasks() {
  try {
    tasks = await fetch('/api/tasks').then(r => r.json());
    renderAll();
  } catch (e) {
    appendLog('Failed to load tasks: ' + e.message, 'error');
  }
}

async function readSse(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let savedTask = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        if (parsed.done) savedTask = parsed.task;
        else appendLog(parsed.msg, parsed.type, parsed.time);
      } catch (_) {}
    }
  }
  return savedTask;
}

async function saveTask() {
  const base = selectedTaskId ? tasks.find(task => task.id === selectedTaskId) : null;
  const payload = taskFromForm(base);
  clearConsole();
  setBusy(true);

  try {
    const url = selectedTaskId ? `/api/tasks/${selectedTaskId}` : '/api/tasks';
    const method = selectedTaskId ? 'PUT' : 'POST';
    const response = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const saved = await readSse(response);
    await loadTasks();
    if (saved) {
      selectedTaskId = saved.id;
      const fresh = tasks.find(task => task.id === saved.id);
      if (fresh) loadTask(fresh);
    }
  } catch (e) {
    appendLog('Fetch error: ' + e.message, 'error');
  } finally {
    setBusy(false);
  }
}

async function toggleTask(task) {
  clearConsole();
  try {
    const response = await fetch(`/api/tasks/${task.id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...task, enabled: !task.enabled })
    });
    await readSse(response);
    await loadTasks();
  } catch (e) {
    appendLog('Toggle failed: ' + e.message, 'error');
  }
}

async function deleteTask(task) {
  if (!confirm(`Delete task "${task.name}"?`)) return;
  clearConsole();
  try {
    const result = await fetch(`/api/tasks/${task.id}`, { method: 'DELETE' }).then(r => r.json());
    if (!result.ok) {
      appendLog(result.error || 'Delete failed', 'error');
      return;
    }
    appendLog('Task deleted.', 'success');
    if (selectedTaskId === task.id) clearForm();
    await loadTasks();
  } catch (e) {
    appendLog('Delete failed: ' + e.message, 'error');
  }
}

async function runSelectedTask() {
  if (!selectedTaskId) {
    appendLog('Select or save a task before test run.', 'error');
    return;
  }
  try {
    const result = await fetch(`/api/tasks/${selectedTaskId}/run`, { method: 'POST' }).then(r => r.json());
    if (!result.ok) appendLog(result.error || 'Failed to start task', 'error');
    else appendLog('Test run opened in a new terminal.', 'success');
  } catch (e) {
    appendLog('Test run failed: ' + e.message, 'error');
  }
}

async function browse() {
  try {
    const result = await fetch('/api/browse').then(r => r.json());
    if (result.path) $('projectDir').value = result.path;
  } catch (e) {
    appendLog('Browse failed: ' + e.message, 'error');
  }
}

async function postSimple(url, okMessage) {
  try {
    await fetch(url, { method: 'POST' });
    appendLog(okMessage, 'success');
  } catch (e) {
    appendLog(e.message, 'error');
  }
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(item => item.classList.remove('active'));
    btn.classList.add('active');
    $(btn.dataset.tab + 'Panel').classList.add('active');
  });
});

$('saveBtn').addEventListener('click', saveTask);
$('testRunBtn').addEventListener('click', runSelectedTask);
$('clearBtn').addEventListener('click', clearForm);
$('loadDefaultBtn').addEventListener('click', () => { $('prompt').value = DEFAULT_PROMPT; });
$('browseBtn').addEventListener('click', browse);
$('viewLogsBtn').addEventListener('click', () => postSimple('/api/open-logs', 'Opened logs folder.'));
$('taskSchdBtn').addEventListener('click', () => postSimple('/api/open-taskschd', 'Opened Task Scheduler.'));
$('prevMonth').addEventListener('click', () => {
  calendarDate.setMonth(calendarDate.getMonth() - 1);
  selectedCalendarDay = null;
  renderCalendar();
});
$('nextMonth').addEventListener('click', () => {
  calendarDate.setMonth(calendarDate.getMonth() + 1);
  selectedCalendarDay = null;
  renderCalendar();
});

clearForm();
appendLog('Ready.');
loadTasks();
</script>
</body>
